  <link rel="apple-touch-icon" href="/3marh/assets/icon-192x192-BcWGK3Fa.png">
  <meta name="theme-color" content="#ffffff">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    // Anti-flicker script for dark mode
    if (localStorage.getItem('rentals_theme') === 'dark' || (!('rentals_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <script type="module" crossorigin src="/3marh/assets/index-Caf5hHEi.js"></script>
  <link rel="stylesheet" crossorigin href="/3marh/assets/index-DqBNWi4r.css">
</head>
<body>
  
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  
  
  <script>
    // Clean any legacy caches up front (v1, v2, v3-timestamp variants)
    if ('caches' in window) {
      caches.keys().then(keys => {
        keys.forEach(k => {
          if (k === 'rentals-v1' || k === 'rentals-v2' || k.startsWith('rentals-v3')) {
            caches.delete(k).catch(() => {});
          }
        });
      }).catch(() => {});
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('./sw.js', { scope: './' });
          // Force update check on every page load
          registration.update().catch(() => {});

          // Reload exactly once when a new SW takes over an existing controlled page
          let didReload = false;
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller && !didReload) {
                didReload = true;
                window.location.reload();
              }
            });
          });
        } catch (err) {
          console.warn('SW registration failed:', err);
        }
      });
    }
  </script>
</body>
</html>
