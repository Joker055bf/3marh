<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متابعة عقاراتي</title>
  
  <link rel="manifest" href="/3marh/assets/manifest-D6vsdKQ1.json">
  <link rel="apple-touch-icon" href="/3marh/assets/icon-192x192-BcWGK3Fa.png">
  <meta name="theme-color" content="#ffffff">
  
  <script>
    // Anti-flicker script for dark mode
    if (localStorage.getItem('rentals_theme') === 'dark' || (!('rentals_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <script type="module" crossorigin src="/3marh/assets/index-D6L8UJmF.js"></script>
  <link rel="stylesheet" crossorigin href="/3marh/assets/index-f4GB4DcA.css">
</head>
<body>
  
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          // Unregister any old service workers first to clear stale caches
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) {
            // Force update on existing registration
            await reg.update();
          }
          // Clear all caches to ensure fresh content
          if ('caches' in window) {
            const cacheNames = await caches.keys();
            const oldCaches = cacheNames.filter(n => n === 'rentals-v1' || n === 'rentals-v2');
            await Promise.all(oldCaches.map(n => caches.delete(n)));
          }
          // Register the new service worker
          const registration = await navigator.serviceWorker.register('./sw.js', { scope: './' });
          console.log('SW registered with scope: ', registration.scope);
          // If a new worker is found, force it to activate
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available - reload to get it
                  window.location.reload();
                }
              });
            }
          });
        } catch (err) {
          console.log('SW setup failed: ', err);
        }
      });
    }
  </script>
</body>
</html>
