<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متابعة عقاراتي</title>
  
  <link rel="manifest" href="./assets/manifest-D6vsdKQ1.json">
  <link rel="apple-touch-icon" href="./icon-512x512.png">
  <meta name="theme-color" content="#ffffff">
  
  <script>
    // Anti-flicker script for dark mode
    if (localStorage.getItem('rentals_theme') === 'dark' || (!('rentals_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <script type="module" crossorigin src="./assets/index-CEFIgCEo.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-BtvBgJeu.css">
</head>
<body>
  
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' }).then(registration => {
          console.log('SW registered with scope: ', registration.scope);
        }).catch(registrationError => {
          console.log('SW registration failed: ', registrationError);
        });
      });
    }
  </script>
</body>
</html>
